<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AeroCalendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; }
  </style>
</head>
<body class="text-[#e4e4e7] min-h-screen flex items-start justify-center p-4">

  <div id="master-workspace" class="w-full max-w-md bg-[#050507] border border-[#16161e] rounded-3xl p-4 space-y-4">
    <div class="flex items-center justify-between">
      <div>
        <h1 id="month-year-display" class="text-lg font-bold text-white">Aero Calendar</h1>
      </div>
    </div>
    
    <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-[#4a4a52] uppercase font-mono">
      <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
    </div>
    
    <div id="calendar-days-matrix" class="grid grid-cols-7 gap-1.5"></div>
    
    <div class="border-t border-[#14141a] pt-2">
      <h2 class="text-xs font-bold text-[#a1a1aa]">Today's Agenda</h2>
      <div class="text-[11px] text-[#4a4a52] py-4 text-center border border-dashed border-[#16161f] rounded-xl mt-2">No tasks logged.</div>
    </div>
  </div>

  <script>
    (function() {
      let focusDateInstance = new Date();
      focusDateInstance.setDate(1);
      
      const monthNamesRef = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

      function convertToDataKey(y, m, d) {
        return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      }

      function buildGrid() {
        const targetGrid = document.getElementById('calendar-days-matrix');
        const displayLabel = document.getElementById('month-year-display');
        
        if (!targetGrid || !displayLabel) return;
        targetGrid.innerHTML = '';

        const y = focusDateInstance.getFullYear();
        const m = focusDateInstance.getMonth();
        displayLabel.innerText = `${monthNamesRef[m]} ${y}`;

        const today = new Date();
        const highlightedDateStr = convertToDataKey(today.getFullYear(), today.getMonth(), today.getDate());

        const firstWeekdayOffset = new Date(y, m, 1).getDay();
        const totalDaysInCurrentMonth = new Date(y, m + 1, 0).getDate();

        // Render blank spaces for preceding month offset
        for (let i = 0; i < firstWeekdayOffset; i++) {
          const padCell = document.createElement('div');
          padCell.className = "aspect-square";
          targetGrid.appendChild(padCell);
        }

        // Render actual day cells
        for (let day = 1; day <= totalDaysInCurrentMonth; day++) {
          const loopDateKey = convertToDataKey(y, m, day);
          const isActiveSelection = (loopDateKey === highlightedDateStr);
          
          const cellButton = document.createElement('button');
          cellButton.type = "button";
          cellButton.className = `aspect-square rounded-xl border flex flex-col items-center justify-center text-xs font-semibold p-1 ${isActiveSelection ? 'bg-indigo-600/20 border-indigo-500 text-white' : 'bg-[#09090c] border-[#13131a] text-[#a1a1aa]'}`;
          cellButton.innerText = day;

          targetGrid.appendChild(cellButton);
        }
      }

      // Execute generation directly
      buildGrid();
    })();
  </script>
</body>
</html>
